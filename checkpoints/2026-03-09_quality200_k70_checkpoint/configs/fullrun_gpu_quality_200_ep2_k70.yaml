data:
  dataset_dir: ../LENS/ml-25m
  min_rating: 3.5
  max_rows: null
  val_k: 1
  test_k: 1
  min_user_interactions: 5

baseline:
  enabled: false

retrieval:
  algorithm: als
  factors: 96
  regularization: 0.02
  iterations: 15
  alpha: 40
  recommend_batch_size: 8192
  log_every_batches: 10
  seed: 42
  use_gpu: true
  require_gpu: true

ranker:
  framework: xgboost
  features_use_gpu: true
  recent_genres_n: 10
  n_estimators: 160
  learning_rate: 0.07
  max_depth: 6
  subsample: 0.9
  colsample_bytree: 0.9
  tree_method: hist
  device: cuda
  n_jobs: 2
  max_bin: 256
  train_negative_ratio: 35
  train_max_rows: 2500000
  train_sample_seed: 42
  seed: 42

final_model:
  enabled: true
  candidate_fusion:
    enabled: false
  two_tower:
    embedding_dim: 64
    lr: 0.001
    batch_size: 12288
    epochs: 2
    num_negatives: 6
    weight_decay: 0.000001
    grad_clip: 2.0
    neg_sampling_pop_power: 0.75
    pop_blend_weight: 0.10
    query_batch_size: 12288
    candidate_multiplier: 2
    train_log_every_batches: 60
    query_log_every_batches: 5
    use_gpu: true
    require_gpu: true
    seed: 42
  ranker:
    framework: xgboost
    features_use_gpu: true
    recent_genres_n: 10
    n_estimators: 180
    learning_rate: 0.07
    max_depth: 6
    subsample: 0.9
    colsample_bytree: 0.9
    tree_method: hist
    device: cuda
    n_jobs: 2
    max_bin: 256
    train_negative_ratio: 40
    train_max_rows: 3000000
    train_sample_seed: 42
    seed: 42
  ranker_ensemble:
    enabled: false

evaluation:
  k_candidates: 70
  ks: [10, 20]

outputs:
  tables_dir: outputs/fullrun_gpu_quality_200_ep2_k70/tables
  figures_dir: outputs/fullrun_gpu_quality_200_ep2_k70/figures

logging:
  resource_snapshot: true
  progress_resources: true
  gpu_index: 0
