data:
  dataset_dir: ../LENS/ml-25m
  min_rating: 3.5
  max_rows: null
  val_k: 1
  test_k: 1
  min_user_interactions: 5

baseline:
  enabled: true

retrieval:
  algorithm: als
  factors: 128
  regularization: 0.02
  iterations: 18
  alpha: 45
  recommend_batch_size: 8192
  log_every_batches: 10
  seed: 42
  use_gpu: true
  require_gpu: true

ranker:
  framework: xgboost
  features_use_gpu: true
  n_estimators: 320
  learning_rate: 0.04
  max_depth: 7
  subsample: 0.9
  colsample_bytree: 0.9
  tree_method: hist
  device: cuda
  n_jobs: 2
  max_bin: 256
  seed: 42

final_model:
  enabled: true
  candidate_fusion:
    enabled: true
    use_gpu: true
    two_tower_weight: 0.42
    als_weight: 0.46
    aux_retrieval:
      enabled: true
      algorithm: cosine
      weight: 0.12
      itemknn_k: 220
      itemknn_num_threads: 0
      require_gpu: false
  two_tower:
    embedding_dim: 96
    lr: 0.001
    batch_size: 6144
    epochs: 8
    num_negatives: 20
    weight_decay: 0.000001
    grad_clip: 2.0
    neg_sampling_pop_power: 0.75
    pop_blend_weight: 0.12
    query_batch_size: 2048
    candidate_multiplier: 3
    train_log_every_batches: 80
    query_log_every_batches: 10
    use_gpu: true
    require_gpu: true
    seed: 42
  ranker:
    framework: xgboost
    features_use_gpu: false
    n_estimators: 420
    learning_rate: 0.03
    max_depth: 7
    subsample: 0.9
    colsample_bytree: 0.9
    tree_method: hist
    device: cuda
    n_jobs: 2
    max_bin: 256
    seed: 42
  ranker_ensemble:
    enabled: true
    baseline_weight: 0.45
    final_weight: 0.55

evaluation:
  k_candidates: 160
  ks: [10, 20, 50]

outputs:
  tables_dir: outputs/fullrun_gpu_quality_goal_stable_cpufeat/tables
  figures_dir: outputs/fullrun_gpu_quality_goal_stable_cpufeat/figures

logging:
  resource_snapshot: true
  progress_resources: true
  gpu_index: 0
