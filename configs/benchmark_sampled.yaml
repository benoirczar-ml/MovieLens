data:
  dataset_dir: ../LENS/ml-25m
  min_rating: 0.0
  max_rows: null
  val_k: 1
  test_k: 1
  min_user_interactions: 5

retrieval:
  algorithm: als
  factors: 128
  regularization: 0.02
  iterations: 18
  alpha: 40
  seed: 42
  use_gpu: true
  require_gpu: true

final_model:
  candidate_fusion:
    enabled: true
    two_tower_weight: 0.45
    als_weight: 0.55
  two_tower:
    embedding_dim: 96
    lr: 0.001
    batch_size: 8192
    epochs: 4
    num_negatives: 12
    weight_decay: 0.000001
    grad_clip: 2.0
    neg_sampling_pop_power: 0.75
    pop_blend_weight: 0.12
    query_batch_size: 4096
    candidate_multiplier: 3
    use_gpu: true
    require_gpu: true
    seed: 42

benchmark:
  n_negatives: 100
  max_users: 20000
  ks: [10, 20]
  seed: 42
  itemknn_models: [bm25, cosine, tfidf]
  itemknn_k: 200
  itemknn_num_threads: 8
  bm25_k1: 1.2
  bm25_b: 0.75

outputs:
  tables_dir: outputs/benchmark/tables
  figures_dir: outputs/benchmark/figures
